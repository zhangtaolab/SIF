# DocSift Example Configuration File
# 
# This file demonstrates the configuration format for DocSift.
# Copy this file to ~/.config/docsift/config.yaml and customize as needed.

# =============================================================================
# General Settings
# =============================================================================

# Path to the index database file
# Default: ~/.local/share/docsift/docsift.db
index_path: ~/.local/share/docsift/docsift.db

# Log level: DEBUG, INFO, WARNING, ERROR
# Default: INFO
log_level: INFO

# Log file path (optional, logs to stderr if not set)
# Default: null
log_file: ~/.local/share/docsift/docsift.log

# =============================================================================
# Search Settings
# =============================================================================

search:
  # Default search limit
  # Default: 10
  default_limit: 10
  
  # Maximum search limit
  # Default: 100
  max_limit: 100
  
  # Enable query expansion
  # Default: true
  query_expansion: true
  
  # BM25 parameters
  bm25:
    # BM25 k1 parameter (term frequency saturation)
    # Default: 1.5
    k1: 1.5
    
    # BM25 b parameter (length normalization)
    # Default: 0.75
    b: 0.75
  
  # Vector search settings
  vector:
    # Embedding model to use
    # Default: sentence-transformers/all-MiniLM-L6-v2
    model: sentence-transformers/all-MiniLM-L6-v2
    
    # Vector dimension (depends on model)
    # Default: 384 (for all-MiniLM-L6-v2)
    dimension: 384
    
    # Similarity threshold for vector search
    # Default: 0.7
    similarity_threshold: 0.7
  
  # Hybrid search settings
  hybrid:
    # Weight for BM25 scores (0-1)
    # Default: 0.3
    bm25_weight: 0.3
    
    # Weight for vector scores (0-1)
    # Default: 0.7
    vector_weight: 0.7
    
    # RRF (Reciprocal Rank Fusion) k parameter
    # Default: 60
    rrf_k: 60
  
  # Reranking settings
  rerank:
    # Enable reranking
    # Default: true
    enabled: true
    
    # Reranker model
    # Default: cross-encoder/ms-marco-MiniLM-L-6-v2
    model: cross-encoder/ms-marco-MiniLM-L-6-v2
    
    # Number of candidates to rerank
    # Default: 20
    top_k: 20

# =============================================================================
# Indexing Settings
# =============================================================================

indexing:
  # File extensions to index
  # Default: [".md", ".txt", ".rst", ".py", ".js", ".ts", ".java", ".go", ".rs"]
  extensions:
    - .md
    - .txt
    - .rst
    - .py
    - .js
    - .ts
    - .java
    - .go
    - .rs
    - .cpp
    - .c
    - .h
    - .hpp
  
  # Directories to exclude
  # Default: [".git", "node_modules", "__pycache__", ".venv", "venv", "dist", "build"]
  exclude_dirs:
    - .git
    - node_modules
    - __pycache__
    - .venv
    - venv
    - dist
    - build
    - .idea
    - .vscode
  
  # Files to exclude (glob patterns)
  # Default: ["*.min.js", "*.min.css", "*.lock"]
  exclude_patterns:
    - "*.min.js"
    - "*.min.css"
    - "*.lock"
    - "*.sum"
  
  # Chunk size for document splitting (in characters)
  # Default: 1000
  chunk_size: 1000
  
  # Chunk overlap (in characters)
  # Default: 200
  chunk_overlap: 200
  
  # Maximum file size to index (in bytes)
  # Default: 10485760 (10MB)
  max_file_size: 10485760

# =============================================================================
# Collection Settings
# =============================================================================

collections:
  # Define your document collections here
  # Each collection has a name and a path
  
  # Example collection
  docs:
    path: ~/Documents
    description: "Personal documents"
    
    # Collection-specific indexing settings (optional)
    indexing:
      extensions:
        - .md
        - .txt
      exclude_dirs:
        - .git
  
  # Another example collection
  projects:
    path: ~/Projects
    description: "Project files"
    
    # Disable auto-indexing for this collection
    auto_index: false

# =============================================================================
# MCP Server Settings
# =============================================================================

mcp:
  # MCP server name
  # Default: docsift-mcp-server
  name: docsift-mcp-server
  
  # MCP server version
  # Default: 1.0.0
  version: "1.0.0"
  
  # Protocol version
  # Default: 2024-11-05
  protocol_version: "2024-11-05"
  
  # HTTP transport settings
  http:
    # Host to bind to
    # Default: 127.0.0.1
    host: 127.0.0.1
    
    # Port to listen on
    # Default: 8080
    port: 8080
    
    # Enable CORS
    # Default: true
    cors: true

# =============================================================================
# CLI Settings
# =============================================================================

cli:
  # Default output format
  # Options: table, json, csv, md, xml, files
  # Default: table
  default_format: table
  
  # Enable colorful output
  # Default: true
  color: true
  
  # Show progress bars
  # Default: true
  progress: true

# =============================================================================
# Advanced Settings
# =============================================================================

advanced:
  # Database connection pool size
  # Default: 5
  db_pool_size: 5
  
  # Database timeout (seconds)
  # Default: 30
  db_timeout: 30
  
  # Enable WAL mode for SQLite
  # Default: true
  sqlite_wal: true
  
  # Cache size for embeddings (number of entries)
  # Default: 1000
  embedding_cache_size: 1000
  
  # Batch size for indexing operations
  # Default: 100
  batch_size: 100
